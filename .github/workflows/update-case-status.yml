name: Update Case Status

on:
  schedule:
    - cron: '0 14 * * 0'  # Sundays at 2 PM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Set to 1 to log changes without writing to Supabase'
        required: false
        default: '0'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase requests

      - name: Run case status updater
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
        run: python scripts/update_case_status.py
