name: Generate Articles
on:
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Number of articles to generate'
        default: '1'
      model:
        description: 'Claude model to use'
        default: 'claude-haiku-4-5-20251001'
      generation_mode:
        description: 'batch (50% off) or standard (real-time)'
        default: 'standard'
      content_type:
        description: 'Content type: mixed, news, or settlement'
        default: 'mixed'
      categories:
        description: 'Comma-separated categories (empty = balanced auto-select)'
        default: ''
      topic_url:
        description: 'Optional: URL of a specific settlement to write about'
        default: ''
      topic_idea:
        description: 'Optional: Specific settlement topic or case name'
        default: ''
      admin_run_id:
        description: 'UUID from admin DB generation_runs'
        default: ''
      prompt_version:
        description: 'Prompt version label'
        default: 'v1'
  schedule:
    - cron: '0 15 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install anthropic supabase requests
      - name: Generate Articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_SUPABASE_URL: ${{ secrets.ADMIN_SUPABASE_URL }}
          ADMIN_SUPABASE_KEY: ${{ secrets.ADMIN_SUPABASE_KEY }}
          ARTICLES_COUNT: ${{ inputs.articles_count || '1' }}
          MODEL: ${{ inputs.model || 'claude-haiku-4-5-20251001' }}
          GENERATION_MODE: ${{ inputs.generation_mode || 'standard' }}
          CONTENT_TYPE: ${{ inputs.content_type || 'mixed' }}
          CATEGORIES: ${{ inputs.categories || '' }}
          TOPIC_URL: ${{ inputs.topic_url || '' }}
          TOPIC_IDEA: ${{ inputs.topic_idea || '' }}
          ADMIN_RUN_ID: ${{ inputs.admin_run_id || '' }}
          PROMPT_VERSION: ${{ inputs.prompt_version || 'v1' }}
        run: python scripts/generate_articles.py

  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: generate
    if: needs.generate.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install anthropic supabase requests
      - name: Run Review Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_SUPABASE_URL: ${{ secrets.ADMIN_SUPABASE_URL }}
          ADMIN_SUPABASE_KEY: ${{ secrets.ADMIN_SUPABASE_KEY }}
        run: python scripts/review_pipeline.py

  images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: review
    if: needs.review.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Generate hero images for new articles
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_SITE_KEY: classactionlawupdates
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/generate-missing-images.ts
      - name: Trigger site rebuild
        if: success()
        run: |
          if [ -n "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            echo "Triggering Cloudflare Pages rebuild..."
            curl -s -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
            echo "Deploy triggered."
          else
            echo "DEPLOY_HOOK_URL secret not set — skipping rebuild."
          fi
