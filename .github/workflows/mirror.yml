name: Mirror to GitLab

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git clone --bare "https://github.com/$GITHUB_REPOSITORY" repo.git
          cd repo.git
          git push --mirror "https://natewebman:${GITLAB_TOKEN}@gitlab.com/natewebman-backups/natewebman-classactionlawupdates-backup.git"
