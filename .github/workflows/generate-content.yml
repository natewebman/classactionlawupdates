name: Generate Content
on:
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Number of articles to generate'
        default: '3'
      model:
        description: 'Claude model to use'
        default: 'claude-haiku-4-5-20251001'
      generation_mode:
        description: 'batch (50% off) or standard (real-time)'
        default: 'standard'
      categories:
        description: 'Comma-separated categories (empty = random)'
        default: ''
      admin_run_id:
        description: 'UUID from admin DB generation_runs'
        default: ''
      prompt_version:
        description: 'Prompt version label'
        default: 'v1'
  schedule:
    - cron: '0 12 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install anthropic supabase
      - name: Generate Content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_SUPABASE_URL: ${{ secrets.ADMIN_SUPABASE_URL }}
          ADMIN_SUPABASE_KEY: ${{ secrets.ADMIN_SUPABASE_KEY }}
          ARTICLES_COUNT: ${{ inputs.articles_count || '3' }}
          MODEL: ${{ inputs.model || 'claude-haiku-4-5-20251001' }}
          GENERATION_MODE: ${{ inputs.generation_mode || 'standard' }}
          CATEGORIES: ${{ inputs.categories || '' }}
          ADMIN_RUN_ID: ${{ inputs.admin_run_id || '' }}
          PROMPT_VERSION: ${{ inputs.prompt_version || 'v1' }}
        run: python scripts/generate_content.py

  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: generate          # Always runs after generate, even if some articles failed
    if: always()             # Don't skip if generate had partial failures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install anthropic supabase requests
      - name: Run Review Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_SUPABASE_URL: ${{ secrets.ADMIN_SUPABASE_URL }}
          ADMIN_SUPABASE_KEY: ${{ secrets.ADMIN_SUPABASE_KEY }}
        run: python scripts/review_pipeline.py

  images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: review
    if: always() && needs.review.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Generate hero images for new articles
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUBLIC_SITE_KEY: classactionlawupdates
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/generate-missing-images.ts
